name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Pull Docker image
        run: docker pull ziyahulhaq/employs:latest

      - name: Stop old container
        run: docker stop employs-container || true

      - name: Remove old container
        run: docker rm employs-container || true

      - name: Run container
        run: |
          docker run -d -p 3444:3444 \
          --name employs-container \
          -e MONGODB_URL=${{ secrets.MONGODB_URL }} \
          -e JWT_KEY=${{ secrets.JWT_KEY }} \
          --restart unless-stopped \
          ziyahulhaq/employs:latest