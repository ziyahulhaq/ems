name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Pull Docker image
        run: docker pull ziyahulhaq/employs:latest

      - name: Stop and remove old container
        run: docker rm -f employs-container || true

      - name: Run new container
        run: |
          docker run -d \
          -p 3444:3444 \
          --name employs-container \
          -e MONGODB_URL=${{ secrets.MONGODB_URL }} \
          ziyahulhaq/employs:latest